spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:spems_db;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1800000
      pool-name: SPEMSHikariDevPool

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:vishnupriyaravula3@gmail.com}
    password: ${MAIL_PASSWORD:qsfbhbuwkrokzzvd}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    com.enterprise.spems: DEBUG
    org.hibernate.SQL: DEBUG
